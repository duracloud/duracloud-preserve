[package]
name = "app"
version = "0.1.0"
edition = "2024"

[features]
duckdb = ["awsutils/duckdb", "apputils/duckdb"]

[dependencies]
askama = "0.15.4"
apputils = { path = "../apputils" }
aws-config = "1.8.15"
aws-sdk-s3 = "1.125.0"
aws-sdk-s3control = "1.112.0"
aws-smithy-types = "1.3.4"
awsutils = { path = "../awsutils" }
bytes = "1.11.0"
chrono = "0.4.44"
csv = "1"
futures = "0.3.32"
serde_json = "1.0.149"
tempfile = "3"
thiserror = "2.0.18"
tokio = { version = "1.50.0", features = ["macros", "rt-multi-thread"] }
tracing = "0.1"

[dev-dependencies]
test-support = { path = "../test-support" }
