[package]
name = "app"
version = "0.1.0"
edition = "2024"

[features]
duckdb = ["awsutils/duckdb", "apputils/duckdb"]

[dependencies]
apputils = { path = "../apputils" }
aws-config = "1.8.13"
aws-sdk-s3 = "1.122.0"
aws-sdk-s3control = "1.109.0"
aws-smithy-types = "1.3.4"
awsutils = { path = "../awsutils" }
bytes = "1.11.0"
futures = "0.3.31"
serde_json = "1.0.149"
tempfile = "3"
tokio = { version = "1.49.0", features = ["macros", "rt-multi-thread"] }
tracing = "0.1"
