[workspace]
resolver = "3"
members = [
    "cli",
    "functions/bucket-request",
    "functions/compute-checksums",
    "functions/checksum-report",
    "functions/inventory-report",
    "shared/app",
    "shared/apputils",
    "shared/awsutils",
    "shared/test-support"
]

[profile.release]
codegen-units = 1
lto = "thin"
opt-level = "z"
panic = "abort"
strip = "symbols"
