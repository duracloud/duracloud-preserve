[package]
name = "duracloud"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "duracloud"
path = "src/main.rs"

[dependencies]
apputils = { path = "../shared/apputils" }
awsutils = { path = "../shared/awsutils" }
aws-config = { version = "1.6", features = ["behavior-version-latest"] }
aws-sdk-s3 = "1.116.0"
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
