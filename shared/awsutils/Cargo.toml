[package]
name = "awsutils"
version = "0.1.0"
edition = "2024"

[dependencies]
apputils = { path = "../apputils" }
aws-config = "1.8.11"
aws-sdk-iam = "1.101.0"
aws-sdk-s3 = "1.116.0"
aws-sdk-s3control = "1.107.0"
aws-sdk-sts = "1.95.0"
aws-smithy-runtime = { version = "1.9.4", features = ["test-util"] }
aws-smithy-runtime-api = "1.9.2"
aws-smithy-types = "1.3.4"
bytes = "1.11.0"
csv = "1.4.0"
futures = "0.3.31"
http = "1.4.0"
duckdb = { version = "1.4", features = ["bundled"] }
serde = {version = "1.0.228", features = ["derive"]}
serde_json = "1.0.145"
tempfile = "3"
thiserror = "2.0.17"
tokio = { version = "1.48.0", features = ["macros", "rt-multi-thread"] }
tracing = "0.1"
