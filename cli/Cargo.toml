[package]
name = "duracloud"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "duracloud"
path = "src/main.rs"

[dependencies]
apputils = { path = "../shared/apputils" }
awsutils = { path = "../shared/awsutils" }
aws-config = { version = "1.6", features = ["behavior-version-latest"] }
aws-sdk-iam = "1"
aws-sdk-s3 = "1.116.0"
aws-sdk-sts = "1"
clap = { version = "4", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
