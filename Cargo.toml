[workspace]
resolver = "3"
members = [
  "cli",
  "functions/bucket-request",
  "functions/compute-checksums",
  "functions/checksum-report",
  "functions/inventory-report",
  "functions/storage-report",
  "shared/app",
  "shared/apputils",
  "shared/awsutils",
  "shared/test-support",
]

[workspace.dependencies]
# Internal
app = { path = "shared/app" }
apputils = { path = "shared/apputils" }
awsutils = { path = "shared/awsutils" }
test-support = { path = "shared/test-support" }

# AWS
aws-config = "1.8.15"
aws-sdk-iam = "1.107.0"
aws-sdk-s3 = "1.127.0"
aws-sdk-s3control = "1.113.0"
aws-sdk-ssm = "1.108.0"
aws-sdk-sts = "1.101.0"
aws-smithy-runtime = "1.9.4"
aws-smithy-types = "1.4.7"
aws_lambda_events = { version = "1.1.2", default-features = false }
lambda_runtime = "1.1.2"

# Serialization
csv = "1.4.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"

# Async
futures = "0.3.32"
tokio = { version = "1.50.0", features = ["macros", "rt-multi-thread"] }

# Web/HTTP
http = "1.4.0"

# Templating
askama = "0.15.4"

# Time
chrono = "0.4.44"

# Error handling
thiserror = "2.0.18"

# Misc
bytes = "1.11.0"
tempfile = "3"
tracing = "0.1"

[profile.release]
codegen-units = 1
lto = "thin"
opt-level = "z"
panic = "abort"
strip = "symbols"
